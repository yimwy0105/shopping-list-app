<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    min-height: 100vh;
  }
  .app {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 480px;
    padding: 32px 24px;
    align-self: flex-start;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    color: #1a1a1a;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: #4f8cff; }
  .input-row button {
    padding: 10px 18px;
    background: #4f8cff;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .input-row button:hover { background: #3a6fd8; }

  .count { font-size: 0.85rem; color: #888; margin-bottom: 12px; }

  ul { list-style: none; }
  li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  li:last-child { border-bottom: none; }

  li input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #4f8cff;
    cursor: pointer;
    flex-shrink: 0;
  }
  li .text {
    flex: 1;
    font-size: 1rem;
    color: #333;
    word-break: break-word;
  }
  li.checked .text {
    text-decoration: line-through;
    color: #aaa;
  }
  li .delete-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }
  li .delete-btn:hover { color: #e55; background: #fff0f0; }

  .empty {
    text-align: center;
    color: #bbb;
    padding: 32px 0;
    font-size: 0.95rem;
  }
</style>
</head>
<body>
<div class="app">
  <h1>🛒 쇼핑 리스트</h1>
  <div class="input-row">
    <input type="text" id="itemInput" placeholder="아이템 추가..." autofocus>
    <button id="addBtn">추가</button>
  </div>
  <div class="count" id="count"></div>
  <ul id="list"></ul>
</div>

<script>
  const STORAGE_KEY = 'shopping-list-data';
  let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const input = document.getElementById('itemInput');
  const addBtn = document.getElementById('addBtn');

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function render() {
    if (items.length === 0) {
      listEl.innerHTML = '<li class="empty">리스트가 비어 있습니다</li>';
      countEl.textContent = '';
      return;
    }
    const checked = items.filter(i => i.checked).length;
    const remaining = items.length - checked;
    countEl.textContent = `전체 ${items.length} | 완료 ${checked} | 남은 항목 ${remaining}`;

    listEl.innerHTML = items.map(item => `
      <li class="${item.checked ? 'checked' : ''}" data-id="${item.id}">
        <input type="checkbox" ${item.checked ? 'checked' : ''}>
        <span class="text">${escapeHtml(item.text)}</span>
        <button class="delete-btn" title="삭제">&times;</button>
      </li>
    `).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function addItem() {
    const text = input.value.trim();
    if (!text) return;
    items.push({ id: Date.now(), text, checked: false });
    input.value = '';
    save();
    render();
    input.focus();
  }

  addBtn.addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  listEl.addEventListener('click', e => {
    const li = e.target.closest('li[data-id]');
    if (!li) return;
    const id = Number(li.dataset.id);

    if (e.target.matches('input[type="checkbox"]')) {
      const item = items.find(i => i.id === id);
      if (item) item.checked = !item.checked;
      save();
      render();
    } else if (e.target.matches('.delete-btn')) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }
  });

  render();
</script>
</body>
</html>
